apiVersion: ray.io/v1
kind: RayService
metadata:
  name: deepseek-rayservice-simple
  namespace: default
spec:
  serviceUnhealthySecondThreshold: 900
  deploymentUnhealthySecondThreshold: 300

  # Simplified service configuration using vLLM directly
  serveConfigV2: |
    proxy_location: EveryNode

    applications:
      - name: deepseek-llm
        route_prefix: /
        import_path: vllm.entrypoints.openai.api_server:app
        runtime_env:
          working_dir: "https://github.com/vllm-project/vllm/archive/refs/heads/main.zip"
          pip:
            - vllm>=0.4.0
            - transformers>=4.38.0
            - torch>=2.1.0
            - fastapi
            - uvicorn
          env_vars:
            HUGGING_FACE_HUB_TOKEN: "YOUR_HUGGINGFACE_TOKEN_HERE"

        args:
          model: "deepseek-ai/deepseek-coder-33b-instruct"
          tensor-parallel-size: 8
          max-model-len: 4096
          gpu-memory-utilization: 0.95
          host: "0.0.0.0"
          port: 8000

  rayClusterConfig:
    rayVersion: '2.9.0'
    enableInTreeAutoscaling: false

    headGroupSpec:
      rayStartParams:
        dashboard-host: '0.0.0.0'
        num-cpus: '0'
      template:
        spec:
          containers:
          - name: ray-head
            image: rayproject/ray-ml:2.9.0-gpu
            ports:
            - containerPort: 6379
              name: gcs
            - containerPort: 8265
              name: dashboard
            - containerPort: 10001
              name: client
            - containerPort: 8000
              name: serve
            env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-secret
                  key: token
            lifecycle:
              preStop:
                exec:
                  command: ["/bin/sh", "-c", "ray stop"]
            resources:
              limits:
                cpu: "8"
                memory: "32Gi"
              requests:
                cpu: "4"
                memory: "16Gi"
            volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
          volumes:
          - name: hf-cache
            emptyDir:
              sizeLimit: 100Gi

    workerGroupSpecs:
    - groupName: gpu-workers
      replicas: 2
      minReplicas: 2
      maxReplicas: 2
      rayStartParams:
        num-gpus: '8'
      template:
        spec:
          # Ensure each worker goes to a different node
          topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                ray.io/group: gpu-workers
                ray.io/cluster: deepseek-rayservice-simple

          containers:
          - name: ray-worker
            image: rayproject/ray-ml:2.9.0-gpu
            lifecycle:
              preStop:
                exec:
                  command: ["/bin/sh", "-c", "ray stop"]
            env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-secret
                  key: token
            - name: NCCL_DEBUG
              value: "INFO"
            - name: NCCL_SOCKET_IFNAME
              value: "eth0"
            resources:
              limits:
                cpu: "64"
                memory: "512Gi"
                nvidia.com/gpu: "8"
              requests:
                cpu: "32"
                memory: "256Gi"
                nvidia.com/gpu: "8"
            volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
            - name: shm
              mountPath: /dev/shm

          volumes:
          - name: hf-cache
            emptyDir:
              sizeLimit: 200Gi
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: 64Gi

          nodeSelector:
            nvidia.com/gpu.present: "true"

          tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
---
apiVersion: v1
kind: Secret
metadata:
  name: huggingface-secret
  namespace: default
type: Opaque
stringData:
  token: "YOUR_HUGGINGFACE_TOKEN_HERE"
---
apiVersion: v1
kind: Service
metadata:
  name: deepseek-serve-simple
  namespace: default
spec:
  selector:
    ray.io/cluster: deepseek-rayservice-simple
    ray.io/node-type: head
  ports:
  - name: serve
    port: 8000
    targetPort: 8000
  - name: dashboard
    port: 8265
    targetPort: 8265
  type: LoadBalancer
